name: open-design

services:
  tunnel:
    container_name: opendesign-cf-tunnel
    image: cloudflare/cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARED_TUNNEL_TOKEN:-}

  open-design:
    container_name: open-design
    image: ${OPEN_DESIGN_IMAGE:-docker.io/vanjayak/open-design:latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NODE_OPTIONS: ${NODE_OPTIONS:---max-old-space-size=192}
      OD_BIND_HOST: 0.0.0.0
      OD_ALLOWED_ORIGINS: ${OPEN_DESIGN_ALLOWED_ORIGINS:-}
      OD_PORT: 7456
      OD_WEB_PORT: ${OPEN_DESIGN_PORT:-7456}
    expose:
      - "7456"
    volumes:
      - ./opendesign-data:/app/.od
      - ./.claude:/home/open-design/.claude
      - ./.claude.json:/home/open-design/.claude.json
    read_only: false
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    mem_limit: ${OPEN_DESIGN_MEM_LIMIT:-384m}
    pids_limit: 256
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:7456/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  default:
    name: opendesign-net
